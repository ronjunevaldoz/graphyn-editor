site_name: Graphyn
site_description: Kotlin Multiplatform workflow editor library
site_url: https://ronjunevaldoz.github.io/graphyn-editor
repo_url: https://github.com/ronjunevaldoz/graphyn-editor
repo_name: graphyn-editor

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Live Demo: /graphyn-editor/app/
  - API Reference: /graphyn-editor/api/
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
      - Installation: getting-started/installation.md
  - Integration Guides:
      - Running Locally: guides/running-locally.md
      - Persistence: guides/persistence.md
      - Read-only Mode: guides/read-only-mode.md
      - Remote Execution: guides/remote-execution.md
      - Embedding on Android: guides/embedding-android.md
      - Embedding on Web: guides/embedding-web.md
      - Server Embedding: guides/server-embedding.md
      - MCP Server: guides/mcp-server.md
  - Extending:
      - Plugin Authoring: guides/plugin-authoring.md
      - Custom Cards: guides/custom-cards.md
      - Theming: guides/theming.md
      - Plugin Versioning: guides/plugin-versioning.md
  - Reference:
      - Type System: reference/type-system.md
      - Keyboard Shortcuts: reference/keyboard-shortcuts.md
      - Serialization: reference/serialization.md
  - Architecture:
      - Overview: architecture/README.md
      - Core API: architecture/core-api.md
      - Editor Panels: architecture/editor-panels.md
      - Plugins: architecture/plugins.md
      - Node Design Research: architecture/node-design-research.md
      - Roadmap: architecture/roadmap.md
      - Lessons Learned: architecture/lessons.md
  - Production:
      - Analytics Hooks: guides/analytics-hooks.md
  - Testing: architecture/test-coverage.md
  - Changelog: changelog.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css: []

# Ensure the standalone HTML comparison widget is copied into the built site
extra_javascript: []
