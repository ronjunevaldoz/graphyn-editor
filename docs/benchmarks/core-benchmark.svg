<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Graphyn core benchmark snapshot</title>
  <desc id="desc">Average microseconds for JSON roundtrip, flatten outputs, and graph impact workloads.</desc>
  <style>
    .bg { fill: #0f172a; }
    .panel { fill: #111827; stroke: #334155; stroke-width: 1.25; }
    .grid { stroke: #1f2937; stroke-width: 1; }
    .label { fill: #e5e7eb; font: 600 18px system-ui, -apple-system, Segoe UI, sans-serif; }
    .subtle { fill: #94a3b8; font: 400 13px system-ui, -apple-system, Segoe UI, sans-serif; }
    .axis { fill: #cbd5e1; font: 500 13px system-ui, -apple-system, Segoe UI, sans-serif; }
    .value { fill: #f8fafc; font: 700 20px system-ui, -apple-system, Segoe UI, sans-serif; }
    .bar-json { fill: #38bdf8; }
    .bar-flatten { fill: #22c55e; }
    .bar-impact { fill: #f59e0b; }
    .card-title { fill: #e2e8f0; font: 700 16px system-ui, -apple-system, Segoe UI, sans-serif; }
    .card-value { fill: #f8fafc; font: 800 26px system-ui, -apple-system, Segoe UI, sans-serif; }
    .card-note { fill: #94a3b8; font: 500 12px system-ui, -apple-system, Segoe UI, sans-serif; }
  </style>

  <rect class="bg" x="0" y="0" width="1100" height="520" rx="24" />
  <rect class="panel" x="24" y="24" width="1052" height="472" rx="20" />

  <text class="label" x="56" y="72">Graphyn core benchmark snapshot</text>
  <text class="subtle" x="56" y="96">Lower is better. Local snapshot from the current workspace machine.</text>

  <line class="grid" x1="96" y1="360" x2="1004" y2="360" />
  <line class="grid" x1="96" y1="300" x2="1004" y2="300" />
  <line class="grid" x1="96" y1="240" x2="1004" y2="240" />
  <line class="grid" x1="96" y1="180" x2="1004" y2="180" />
  <line class="grid" x1="96" y1="120" x2="1004" y2="120" />

  <text class="subtle" x="48" y="364">0</text>
  <text class="subtle" x="24" y="304">1,000</text>
  <text class="subtle" x="24" y="244">2,000</text>
  <text class="subtle" x="24" y="184">3,000</text>
  <text class="subtle" x="24" y="124">4,000</text>

  <!-- scale max 4000us; chart height 240 -->
  <rect class="bar-json" x="186" y="140.9" width="180" height="219.1" rx="16" />
  <rect class="bar-flatten" x="460" y="355.3" width="180" height="4.7" rx="16" />
  <rect class="bar-impact" x="734" y="351.3" width="180" height="8.7" rx="16" />

  <text class="value" x="276" y="124" text-anchor="middle">3,651.74 us</text>
  <text class="value" x="550" y="339" text-anchor="middle">78.78 us</text>
  <text class="value" x="824" y="335" text-anchor="middle">145.66 us</text>

  <text class="axis" x="276" y="394" text-anchor="middle">JSON roundtrip</text>
  <text class="axis" x="550" y="394" text-anchor="middle">Flatten outputs</text>
  <text class="axis" x="824" y="394" text-anchor="middle">Graph impact</text>

  <rect x="56" y="422" width="300" height="58" rx="14" fill="#0b1220" stroke="#1f2937" />
  <text class="card-title" x="76" y="446">Serialization</text>
  <text class="card-value" x="76" y="469">3,651.74 us</text>
  <text class="card-note" x="232" y="469">roundtrip avg</text>

  <rect x="400" y="422" width="300" height="58" rx="14" fill="#0b1220" stroke="#1f2937" />
  <text class="card-title" x="420" y="446">Flattening</text>
  <text class="card-value" x="420" y="469">78.78 us</text>
  <text class="card-note" x="528" y="469">avg</text>

  <rect x="744" y="422" width="300" height="58" rx="14" fill="#0b1220" stroke="#1f2937" />
  <text class="card-title" x="764" y="446">Graph sync</text>
  <text class="card-value" x="764" y="469">145.66 us</text>
  <text class="card-note" x="888" y="469">avg</text>
</svg>
