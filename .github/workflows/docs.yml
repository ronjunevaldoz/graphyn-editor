name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      # ── WasmJS web app ────────────────────────────────────────────────
      - name: Build WasmJS web app
        run: ./gradlew :app:webApp:wasmJsBrowserProductionWebpack --no-daemon

      # ── API docs (Dokka) ──────────────────────────────────────────────
      - name: Generate API docs
        run: ./gradlew dokkaHtmlMultiModule --no-daemon

      # ── MkDocs site ───────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build MkDocs site
        run: mkdocs build --strict

      # ── Merge outputs into site/ ──────────────────────────────────────
      - name: Copy WasmJS app to site/app/
        run: |
          mkdir -p site/app
          cp -r app/webApp/build/dist/wasmJs/productionExecutable/. site/app/

      - name: Copy API docs to site/api/
        run: |
          mkdir -p site/api
          cp -r build/dokka/htmlMultiModule/. site/api/

      # ── Deploy to gh-pages ───────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          force_orphan: true
