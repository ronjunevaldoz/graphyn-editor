name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Compile shared metadata
        run: ./gradlew :app:shared:compileCommonMainKotlinMetadata --no-daemon

      - name: Run core tests
        run: ./gradlew :core:check --no-daemon

      - name: Run plugin-api tests
        run: ./gradlew :plugin-api:jvmTest --no-daemon

      - name: Run shared JVM tests
        run: ./gradlew :app:shared:jvmTest --no-daemon

      - name: Run IO plugin tests
        run: ./gradlew :plugins:io:jvmTest --no-daemon

      - name: Run server tests
        run: ./gradlew :server:test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7
