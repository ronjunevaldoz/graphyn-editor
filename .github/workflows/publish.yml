name: Publish to Maven Central

# Triggered only by pushing a version tag from main:
#   git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags: ['v*.*.*']

jobs:
  publish:
    runs-on: macos-latest
    permissions:
      contents: write   # required for the Create GitHub Release step

    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
      # Strip the leading 'v' so Gradle sees "0.2.0" not "v0.2.0"
      ORG_GRADLE_PROJECT_VERSION: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Strip tag prefix
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Publish core modules
        run: ./gradlew :core:model:publishAllPublicationsToMavenCentralRepository :core:execution:publishAllPublicationsToMavenCentralRepository :core:serialization:publishAllPublicationsToMavenCentralRepository :core:data:publishAllPublicationsToMavenCentralRepository -PVERSION=$VERSION --no-daemon --no-configuration-cache

      - name: Publish graphyn-ui-design (core/designsystem)
        run: ./gradlew :core:designsystem:publishAllPublicationsToMavenCentralRepository -PVERSION=$VERSION --no-daemon --no-configuration-cache

      - name: Publish graphyn-ui-common (core/common)
        run: ./gradlew :core:common:publishAllPublicationsToMavenCentralRepository -PVERSION=$VERSION --no-daemon --no-configuration-cache

      - name: Publish plugin-api
        run: ./gradlew :plugin-api:publishAllPublicationsToMavenCentralRepository -PVERSION=$VERSION --no-daemon --no-configuration-cache

      - name: Publish graphyn-ai
        run: ./gradlew :ai:publishAllPublicationsToMavenCentralRepository -PVERSION=$VERSION --no-daemon --no-configuration-cache

      - name: Publish editor-api
        run: ./gradlew :editor-api:publishAllPublicationsToMavenCentralRepository -PVERSION=$VERSION --no-daemon --no-configuration-cache

      - name: Publish ui-cards
        run: ./gradlew :ui:cards:publishAllPublicationsToMavenCentralRepository -PVERSION=$VERSION --no-daemon --no-configuration-cache

      - name: Publish first-party plugins
        run: ./gradlew :plugins:control:publishAllPublicationsToMavenCentralRepository :plugins:list-ops:publishAllPublicationsToMavenCentralRepository :plugins:types:publishAllPublicationsToMavenCentralRepository :plugins:text:publishAllPublicationsToMavenCentralRepository :plugins:io:publishAllPublicationsToMavenCentralRepository :plugins:json:publishAllPublicationsToMavenCentralRepository :plugins:preview:publishAllPublicationsToMavenCentralRepository :plugins:sticky-notes:publishAllPublicationsToMavenCentralRepository :plugins:script:publishAllPublicationsToMavenCentralRepository :plugins:gmail:publishAllPublicationsToMavenCentralRepository :plugins:linkedin:publishAllPublicationsToMavenCentralRepository -PVERSION=$VERSION --no-daemon --no-configuration-cache

      - name: Publish media plugins
        run: ./gradlew :plugins:media-core:publishAllPublicationsToMavenCentralRepository -PVERSION=$VERSION --no-daemon --no-configuration-cache

      - name: Publish graphyn-plugin-media-ai
        run: ./gradlew :plugins:media-ai:publishAllPublicationsToMavenCentralRepository -PVERSION=$VERSION --no-daemon --no-configuration-cache

      - name: Publish graphyn-plugin-stable-diffusion
        run: ./gradlew :plugins:stable-diffusion:publishAllPublicationsToMavenCentralRepository -PVERSION=$VERSION --no-daemon --no-configuration-cache

      - name: Publish graphyn-runtime
        run: ./gradlew :runtime:publishAllPublicationsToMavenCentralRepository -PVERSION=$VERSION --no-daemon --no-configuration-cache

      - name: Publish graphyn-editor (app/shared)
        run: ./gradlew :app:shared:publishAllPublicationsToMavenCentralRepository -PVERSION=$VERSION --no-daemon --no-configuration-cache

      - name: Publish graphyn-ktor-plugin
        run: ./gradlew :server:publishAllPublicationsToMavenCentralRepository -PVERSION=$VERSION --no-daemon --no-configuration-cache

      # Postflight: a green publish job must mean the artifacts actually reached
      # repo1.maven.org. Without this, uploads can sit unreleased in the Central
      # Portal forever while the job reports success (the v0.3.0–v0.6.0 failure).
      - name: Verify artifacts on Maven Central
        run: ./scripts/verify-maven-central.sh "$VERSION" 2400

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
