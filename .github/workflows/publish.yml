name: Publish to Maven Central

# Triggered only by pushing a version tag from main:
#   git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags: ['v*.*.*']

jobs:
  publish:
    runs-on: macos-latest
    permissions:
      contents: write   # required for the Create GitHub Release step

    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
      # Strip the leading 'v' so Gradle sees "0.2.0" not "v0.2.0"
      ORG_GRADLE_PROJECT_VERSION: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Strip tag prefix
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      # One Gradle invocation for all 28 publish tasks instead of 17 separate `./gradlew` calls.
      # Each separate invocation was paying its own cold JVM start + full project-graph
      # configuration for this whole KMP monorepo before running the one task it was asked for —
      # that repeated overhead, not the actual signing/upload work, was the bulk of a release's
      # 15-20 minutes. Gradle resolves task ordering from the real project dependency graph
      # regardless of the order listed here, so this is equivalent to the old sequence, just
      # configured once. Every artifact is still published every release (lockstep versioning —
      # the README's install snippet uses one version.ref for every graphyn-* artifact, so
      # skipping unchanged modules would 404 on Maven Central for anyone following it).
      - name: Publish all modules to Maven Central
        run: |
          ./gradlew \
            :core:model:publishAllPublicationsToMavenCentralRepository \
            :core:execution:publishAllPublicationsToMavenCentralRepository \
            :core:serialization:publishAllPublicationsToMavenCentralRepository \
            :core:data:publishAllPublicationsToMavenCentralRepository \
            :core:designsystem:publishAllPublicationsToMavenCentralRepository \
            :core:common:publishAllPublicationsToMavenCentralRepository \
            :plugin-api:publishAllPublicationsToMavenCentralRepository \
            :ai:publishAllPublicationsToMavenCentralRepository \
            :editor-api:publishAllPublicationsToMavenCentralRepository \
            :ui:cards:publishAllPublicationsToMavenCentralRepository \
            :plugins:control:publishAllPublicationsToMavenCentralRepository \
            :plugins:list-ops:publishAllPublicationsToMavenCentralRepository \
            :plugins:types:publishAllPublicationsToMavenCentralRepository \
            :plugins:text:publishAllPublicationsToMavenCentralRepository \
            :plugins:io:publishAllPublicationsToMavenCentralRepository \
            :plugins:json:publishAllPublicationsToMavenCentralRepository \
            :plugins:preview:publishAllPublicationsToMavenCentralRepository \
            :plugins:sticky-notes:publishAllPublicationsToMavenCentralRepository \
            :plugins:script:publishAllPublicationsToMavenCentralRepository \
            :plugins:gmail:publishAllPublicationsToMavenCentralRepository \
            :plugins:linkedin:publishAllPublicationsToMavenCentralRepository \
            :plugins:media-core:publishAllPublicationsToMavenCentralRepository \
            :plugins:media-ai:publishAllPublicationsToMavenCentralRepository \
            :plugins:stable-diffusion:publishAllPublicationsToMavenCentralRepository \
            :plugins:shorts:publishAllPublicationsToMavenCentralRepository \
            :runtime:publishAllPublicationsToMavenCentralRepository \
            :app:shared:publishAllPublicationsToMavenCentralRepository \
            :server:publishAllPublicationsToMavenCentralRepository \
            -PVERSION=$VERSION --no-daemon --no-configuration-cache

      # Postflight: a green publish job must mean the artifacts actually reached
      # repo1.maven.org. Without this, uploads can sit unreleased in the Central
      # Portal forever while the job reports success (the v0.3.0–v0.6.0 failure).
      - name: Verify artifacts on Maven Central
        run: ./scripts/verify-maven-central.sh "$VERSION" 2400

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
