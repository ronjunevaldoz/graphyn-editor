name: Publish to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: macos-latest

    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Publish core
        run: ./gradlew :core:publishAllPublicationsToMavenCentralRepository --no-daemon

      - name: Publish plugin-api
        run: ./gradlew :plugin-api:publishAllPublicationsToMavenCentralRepository --no-daemon

      - name: Publish editor-api
        run: ./gradlew :editor-api:publishAllPublicationsToMavenCentralRepository --no-daemon

      - name: Publish graphyn-editor (app/shared)
        run: ./gradlew :app:shared:publishAllPublicationsToMavenCentralRepository --no-daemon
