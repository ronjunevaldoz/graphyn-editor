  <circle cx="68" cy="63" r="3.5" fill="#6366f1" filter="url(#glow)"/>
  <rect x="73" y="59" width="16" height="3" rx="1.5" fill="#6366f1" opacity="0.5"/>
  <rect x="73" y="65" width="12" height="3" rx="1.5" fill="#6366f1" opacity="0.3"/>

