  <circle cx="68" cy="24" r="3.5" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="104" cy="24" r="3.5" fill="#8b5cf6" filter="url(#glow)"/>
  <rect x="73" y="19" width="20" height="3" rx="1.5" fill="#8b5cf6" opacity="0.5"/>
